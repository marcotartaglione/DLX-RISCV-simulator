<mat-dialog-content align="center">
  <mat-form-field appearance="fill">
    <mat-label>Choose a filename</mat-label>
    <input (change)="fileName.set($event.target.value)"
           [errorStateMatcher]="customErrorStateMatcher"
           [formControl]="fileFormControl"
           [value]="fileName()"
           matInput
           placeholder="Ex. file.txt"/>

    @if (fileFormControl.hasError('pattern') && !fileFormControl.hasError('required')) {
      <mat-error>
        .txt file only accepted !
      </mat-error>
    }

    @if (fileFormControl.hasError('required')) {
      <mat-error>
        Please enter a file name
      </mat-error>
    }
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="center">
  <button mat-button mat-dialog-close>Exit</button>
  <button (click)="onSave()" [disabled]="!fileName().endsWith('.txt')" mat-button mat-dialog-close>Save</button>
</mat-dialog-actions>
