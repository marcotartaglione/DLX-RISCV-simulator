<form #form="ngForm">
  <div #hostElement class="editor-host">
    <textarea name="content" style="display: none"></textarea>
  </div>

  @if (errorMessage()) {
    <div class="error-message" @showHideTrigger>
      <mat-card>{{ errorMessage() }}</mat-card>
    </div>
  }

  <div class="btn-container">
    <div class="right">
      <button mat-raised-button class="mr" [disabled]="isInterruptDisabled()" (click)="onInterrupt()">
        <span class="btn">Int (Led) <i class="fas fa-bolt amber"></i></span>
      </button>

      @if (inputPorts.length > 0) {
        <button mat-raised-button class="mr" [matMenuTriggerFor]="menuInputPort" [disabled]="isInterruptDisabled()">
          <span class="btn">Int (Input Port) <i class="fas fa-bolt amber"></i></span>
        </button>
      }

      <mat-menu #menuInputPort="matMenu">
        @for (device of inputPorts; track device.name) {
          <button mat-menu-item (click)="onInterruptPort()">{{ device.name }}</button>
        }
      </mat-menu>

      <button mat-raised-button class="mr" [matMenuTriggerFor]="menu">
        <span class="btn">Save code<i class="fas fa-save"></i></span>
      </button>

      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="save(true)">Save As</button>
        <button mat-menu-item (click)="save(false)">Save</button>
      </mat-menu>

      <button mat-raised-button class="mr" (click)="clear()">
        <span class="btn">Restore default code<i class="fas fa-trash"></i></span>
      </button>
    </div>

    <button mat-raised-button class="mr"
            (click)="executeNextInstruction()"
            [disabled]="isRunDisabled()">
      <span class="btn">Step <i class="fas fa-step-forward fa-lg green"></i></span>
    </button>

    <button mat-raised-button class="mr"
            (click)="keepRunning ? pause() : run()"
            [disabled]="isContinuousRunDisabled()">
      @if (!keepRunning) {
        <span class="btn">Run <i class="fas fa-play green"></i></span>
      }
      @else {
        <span class="btn">Pause <i class="fas fa-pause green"></i></span>
      }
    </button>

    <mat-form-field class="input-interval">
      <mat-label>Interval (ms)</mat-label>
      <input matInput type="number" name="interval" [(ngModel)]="intervalTime" min="1">
    </mat-form-field>

    <button mat-raised-button class="mr" (click)="stop()" [disabled]="isStopDisabled()">
      <span class="btn">Stop <i class="fas fa-square red"></i></span>
    </button>

    <mat-form-field class="input-label">
      <mat-label>Start tag</mat-label>
      <input matInput type="text" name="start" [(ngModel)]="startTag">
    </mat-form-field>

    <mat-form-field class="input-label select">
      <mat-label>Start script</mat-label>
      <mat-select name="scriptSelector"
                  [ngModel]="selectedScript()"
                  (selectionChange)="selectedScriptChange($event.value)">
        @for (script of CodeService.STARTING_SCRIPT[editorMode()]; track script) {
          <mat-option [value]="script">{{ script.replace('_', ' ') }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <div style="clear:both"></div>
  </div>
</form>
