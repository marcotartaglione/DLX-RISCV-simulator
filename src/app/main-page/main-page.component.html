<mat-sidenav-container class="container">
  <mat-sidenav #sidenav class="mat-elevation-z4"
               [mode]="sidebarMode()"
               [opened]="sidebarOpened()"
               (openedChange)="sidebarOpened.set($event)">
    <app-documentation/>
  </mat-sidenav>
  <mat-sidenav-content>
    <div class="main">
      <div class="left">
        <app-editor
          [(pc)]="registers().pc"
          [registers]="registers()"
          (wasContentModified)="contentModified.set($event)"
        />

        <button mat-raised-button class="mr" (click)="toggleDiagrams()">
          @if (this.diagramsOpened()) {
            <span class="btn">Hide Waves Form <i class="fas fa-wave-square"></i></span>
          } @else {
            <span class="btn">Show Waves Form <i class="fas fa-wave-square"></i></span>
          }
        </button>

        <app-memory />
      </div>

      <div class="right">
        @if (this.diagramsOpened()) {
          <app-diagram [registers]="registers()" />
        }
        <app-registers [registers]="registers()"/>
      </div>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
